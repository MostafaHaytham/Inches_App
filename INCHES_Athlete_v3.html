const getPolicyTier=s=>{
  const[tm,ap]=(s.time||'6:00 PM').split(' ');
  const[h,m]=tm.split(':').map(Number);
  const hr=h+(ap==='PM'&&h!==12?12:(ap==='AM'&&h===12?-12:0));
  const dt=new Date(s.date);dt.setHours(hr,m||0,0,0);
  const hrs=(dt-Date.now())/3600000;
  return hrs>24?POLICY[0]:hrs>2?POLICY[1]:POLICY[2];
};

// ── MINI CALENDAR ─────────────────────────────────────────────────────────────
function MiniCal({month,year,selected,onSelect,onPrev,onNext,highlightDays=null}){
  const fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div style={{padding:'0 20px 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <button onClick={onPrev} style={{width:36,height:36,borderRadius:10,background:'transparent',border:`1.5px solid ${G}`,cursor:'pointer',fontSize:18,color:C,fontFamily:FB,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <span style={{fontFamily:FD,fontSize:20,fontWeight:800,color:K}}>{MO_LONG[month]} {year}</span>
        <button onClick={onNext} style={{width:36,height:36,borderRadius:10,background:'transparent',border:`1.5px solid ${G}`,cursor:'pointer',fontSize:18,color:C,fontFamily:FB,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:6}}>
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>(
          <div key={d} style={{textAlign:'center',fontSize:9.5,fontWeight:700,color:'#bbb',fontFamily:FB,padding:'3px 0'}}>{d}</div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
        {cells.map((d,i)=>{
          const dt=d?new Date(year,month,d):null;
          const sel=dt&&sameDay(dt,selected),tod=dt&&isToday(dt);
          const hasSlot=highlightDays&&dt&&highlightDays.includes(dt.getDay())&&(dt>=new Date(new Date().setHours(0,0,0,0)));
          return(
            <div key={i} onClick={()=>dt&&onSelect(dt)}
              style={{height:36,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:10,cursor:d?'pointer':'default',
                background:sel?K:tod?RB:'transparent',
                border:tod&&!sel?`1.5px solid ${R}`:'1.5px solid transparent',
                fontSize:13,fontWeight:sel||tod?700:400,
                color:sel?W:tod?R:d?C:'transparent',fontFamily:FB,transition:'all .12s',
                position:'relative'}}>
              {d||''}
              {hasSlot&&!sel&&<div style={{position:'absolute',bottom:3,left:'50%',transform:'translateX(-50%)',width:4,height:4,borderRadius:'50%',background:GR}}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function QRCheckIn({session,onSuccess,onClose}){
  const[phase,setPhase]=useState('scan'); // scan | success | failed
  const[scanning,setScanning]=useState(true);
  // Simulate scan after 3 seconds
  useEffect(()=>{
    if(phase!=='scan')return;
    const t=setTimeout(()=>{setPhase('success');setScanning(false);},3000);
    return()=>clearTimeout(t);
  },[phase]);

  const QRPattern=()=>(
    <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">

      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>

          <div style={{width:230,height:230,position:'relative'}}>
            {/* Corners */}
            {[{top:0,left:0,borderTop:'3px solid',borderLeft:'3px solid',borderRadius:'6px 0 0 0'},
              {top:0,right:0,borderTop:'3px solid',borderRight:'3px solid',borderRadius:'0 6px 0 0'},
              {bottom:0,left:0,borderBottom:'3px solid',borderLeft:'3px solid',borderRadius:'0 0 0 6px'},
              {bottom:0,right:0,borderBottom:'3px solid',borderRight:'3px solid',borderRadius:'0 0 6px 0'}]

            {scanning&&<div className="scan-line"/>}

      {/* bottom */}
      <div style={{padding:'20px 20px 40px',textAlign:'center'}}>
        {scanning?(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:14}}>
              <div className="pulse-dot" style={{width:8,height:8,borderRadius:'50%',background:R}}/>

            </div>
            <div style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:14,padding:'12px 16px',display:'flex',gap:10,alignItems:'center',marginBottom:16}}>

              <span style={{fontSize:12,color:'rgba(255,255,255,.4)',fontFamily:FB,lineHeight:1.5}}>The coach will show you the QR code on their device or at the gym entrance.</span>
            </div>
            <button onClick={()=>setPhase('success')} style={{width:'100%',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.15)',borderRadius:14,padding:14,fontSize:14,fontWeight:600,color:W,cursor:'pointer',fontFamily:FB}}>
              Simulate Successful Scan ✓
            </button>
          </>
        ):(
          <div style={{fontSize:14,color:GR,fontFamily:FB,fontWeight:600}}>✓ QR Code detected</div>
        )}
      </div>
    </div>
  );
}

// ── CANCEL MODAL ──────────────────────────────────────────────────────────────

    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',zIndex:100,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:W,borderRadius:'24px 24px 0 0',padding:20,maxHeight:'88%',overflowY:'auto'}} className="fade-in">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontFamily:FD,fontSize:22,fontWeight:800,color:K}}>CANCEL SESSION</span>
          <button onClick={onClose} style={{background:'transparent',border:`1.5px solid ${G}`,borderRadius:10,width:36,height:36,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic p={I.X} c={C} s={16}/></button>
        </div>
        <div style={{background:GL,border:`1.5px solid ${G}`,borderRadius:14,padding:'12px 14px',marginBottom:16}}>

            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:t.id===tier.id?700:400,color:t.id===tier.id?K:'#888',fontFamily:FB}}>{t.title}</div>

// ── COACH PROFILE ─────────────────────────────────────────────────────────────

  const activeDays=[0,1,2,3,4,5,6].filter(d=>(COACH_WEEK_SLOTS[coach.id]?.[d]||[]).length>0);

          <Ic p={I.chL} c={W} s={18}/>
        </button>
        <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>

              <span style={{fontSize:11,color:'rgba(255,255,255,.35)',fontFamily:FB}}>· {coach.sessions} sessions · {coach.exp}</span>

        </div>
        <div style={{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}}>

                      <div style={{display:'flex',alignItems:'center',gap:8}}>

                        <span style={{fontSize:11,color:'#aaa',fontFamily:FB}}>· {coach.sessions} sessions</span>
                      </div>

                  <div style={{background:GL,borderRadius:12,padding:'10px 12px',marginBottom:12}}>

                    <button onClick={()=>setCoachView(coach)} style={{flex:1,background:GL,border:`1.5px solid ${G}`,borderRadius:12,padding:'10px 0',fontSize:13,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>View Profile</button>

                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── SCHEDULE SCREEN ───────────────────────────────────────────────────────────
function ScheduleScreen({sessions,onCancel,onCheckIn,initialCancel}){
  const[sTab,setSTab]=useState('upcoming');
  const[selDate,setSelDate]=useState(null);
  const[calMo,setCalMo]=useState(new Date());
  const[showCal,setShowCal]=useState(false);
  const[cancelSess,setCancelSess]=useState(null);
  useEffect(()=>{if(initialCancel){setCancelSess(initialCancel);}},[initialCancel]);
  const up=sessions.filter(s=>s.status==='upcoming').sort((a,b)=>a.date-b.date);
  const past=sessions.filter(s=>s.status!=='upcoming').sort((a,b)=>b.date-a.date);
  const list=(sTab==='upcoming'?up:past).filter(s=>!selDate||sameDay(s.date,selDate));
  const yr=calMo.getFullYear(),mo=calMo.getMonth();
  const stMap={upcoming:[GRB,GR,'● Confirmed'],attended:[RB,R,'✓ Attended'],cancelled:['rgba(0,0,0,.05)','#888','✕ Cancelled'],waitlist:[AMB,AM,'● Waitlist']};
  return(
    <div style={{paddingBottom:24,position:'relative'}}>
      {cancelSess&&<CancelModal session={cancelSess} onConfirm={(s)=>{onCancel(s.id);setCancelSess(null);}} onClose={()=>setCancelSess(null)}/>}
      <div style={{padding:'14px 20px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontFamily:FD,fontSize:30,fontWeight:900,color:K}}>MY SCHEDULE</div>
        <button onClick={()=>setShowCal(!showCal)} style={{display:'flex',alignItems:'center',gap:6,background:showCal?K:W,border:`1.5px solid ${showCal?K:G}`,borderRadius:12,padding:'8px 12px',cursor:'pointer',fontFamily:FB,fontSize:12,fontWeight:600,color:showCal?W:C,transition:'all .15s'}}>
          <Ic p={I.cal} c={showCal?W:R} s={16}/>
          {selDate?fmtD(selDate):'Filter date'}
        </button>
      </div>
      {showCal&&(
        <div style={{marginBottom:14}}>
          <MiniCal month={mo} year={yr} selected={selDate} onSelect={d=>{setSelDate(d);setShowCal(false);}} onPrev={()=>setCalMo(new Date(yr,mo-1,1))} onNext={()=>setCalMo(new Date(yr,mo+1,1))}/>
          {selDate&&<div style={{padding:'0 20px'}}><button onClick={()=>setSelDate(null)} style={{width:'100%',background:GL,border:`1.5px solid ${G}`,borderRadius:12,padding:10,fontSize:13,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>Clear Filter</button></div>}
        </div>
      )}
      <div style={{display:'flex',background:GL,borderRadius:12,padding:4,margin:'0 20px 14px',border:`1.5px solid ${G}`}}>
        {[['upcoming','Upcoming'],['past','Past']].map(([t,l])=>(
          <div key={t} onClick={()=>setSTab(t)} style={{flex:1,textAlign:'center',padding:'9px 0',borderRadius:9,fontSize:13,fontWeight:600,cursor:'pointer',background:sTab===t?W:'transparent',color:sTab===t?K:'#aaa',boxShadow:sTab===t?'0 1px 4px rgba(0,0,0,.12)':'none',fontFamily:FB,transition:'all .15s'}}>{l}</div>
        ))}
      </div>
      <div style={{padding:'0 20px'}}>
        {list.length===0?(
          <div style={{background:GL,border:`1.5px solid ${G}`,borderRadius:18,padding:28,textAlign:'center'}}><div style={{fontSize:13,color:'#888',fontFamily:FB}}>{sTab==='upcoming'?'No upcoming sessions.':'No past sessions.'}</div></div>
        ):list.map(s=>{
          const[sbg,sc,sl]=stMap[s.status]||[RB,R,'● Booked'];
          const canQR=sTab==='upcoming'&&s.status==='upcoming'&&isToday(s.date);
          return(
            <div key={s.id} style={{background:W,border:`1.5px solid ${canQR?RBR:G}`,borderRadius:18,padding:'14px 16px',marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:11,fontWeight:600,color:'#666',fontFamily:FB}}>{fmtD(s.date)} · {s.time}</span>
                    <Tag label={s.type} c={s.type==='PRIVATE'?AM:BL} bg={s.type==='PRIVATE'?AMB:BLB}/>
                  </div>
                  <div style={{fontFamily:FD,fontSize:20,fontWeight:800,color:K,marginBottom:2}}>{s.name}</div>
                  <div style={{fontSize:12,color:'#666',fontFamily:FB}}>{s.coach} · {s.branch}</div>
                </div>
                <div style={{textAlign:'right'}}><div style={{fontFamily:FD,fontSize:24,fontWeight:900,color:R,lineHeight:1}}>{s.pts}</div><div style={{fontSize:10,fontWeight:700,color:'#aaa',fontFamily:FB}}>PTS</div></div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:700,color:sc,background:sbg,padding:'4px 10px',borderRadius:8,fontFamily:FB}}>{sl}</span>
                <div style={{display:'flex',gap:8}}>
                  {sTab==='upcoming'&&s.status==='upcoming'&&!canQR&&<button onClick={()=>setCancelSess(s)} style={{background:'transparent',border:`1.5px solid ${G}`,borderRadius:10,padding:'6px 14px',fontSize:12,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>Cancel</button>}
                  {canQR&&(
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>setCancelSess(s)} style={{background:'transparent',border:`1.5px solid ${G}`,borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>Cancel</button>
                      <button onClick={()=>onCheckIn(s)} style={{background:R,border:'none',borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:700,color:W,cursor:'pointer',fontFamily:FB,display:'flex',alignItems:'center',gap:5}}>
                        <Ic p={I.qr} c={W} s={13}/>Scan QR
                      </button>
                    </div>
                  )}
                  {sTab==='past'&&s.status==='attended'&&!s.rated&&<button style={{background:'transparent',border:`1.5px solid ${R}`,borderRadius:10,padding:'6px 14px',fontSize:12,fontWeight:700,color:R,cursor:'pointer',fontFamily:FB}}>Rate Session</button>}
                  {sTab==='past'&&s.rated&&<span style={{fontSize:13,color:AM,fontWeight:700,fontFamily:FB}}>★★★★★</span>}
                  {sTab==='past'&&s.checkedIn&&<Tag label="✓ Checked In" c={GR} bg={GRB}/>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:K,fontFamily:FB,marginBottom:2}}>{l}</div><div style={{fontSize:11,color:'#888',fontFamily:FB}}>{s}</div></div>
            <Ic p={I.chR} c={'#ccc'} s={16}/>
          </div>
        ))}
        <button style={{width:'100%',marginTop:20,background:'transparent',border:`1.5px solid ${R}33`,borderRadius:14,padding:14,fontSize:14,fontWeight:600,color:R,cursor:'pointer',fontFamily:FB}}>Sign Out</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function InchesAthlete(){
  const[tab,setTab]=useState('home');
  const[sessions,setSessions]=useState(INIT_SESS);
  const[pending,setPending]=useState([]);
  const[initCancel,setInitCancel]=useState(null);
  const[qrSession,setQrSession]=useState(null);

  const handleBook=(s,br,dt)=>setSessions(p=>[...p,{id:Date.now(),date:dt,time:s.time,name:s.name,coach:s.coach,type:'GROUP',pts:s.pts,status:'upcoming',branch:br.name,canCheckIn:isToday(dt)}]);
  const handlePrivateBook=(sl,coach,br,dt)=>setSessions(p=>[...p,{id:Date.now(),date:dt,time:sl.t,name:'PRIVATE TRAINING',coach:`Coach ${coach.name}`,type:'PRIVATE',pts:sl.pts,status:'upcoming',branch:br.name,canCheckIn:isToday(dt)}]);
  const handleCancel=id=>setSessions(p=>p.map(s=>s.id===id?{...s,status:'cancelled'}:s));
  const handleCheckInSuccess=id=>setSessions(p=>p.map(s=>s.id===id?{...s,checkedIn:true,status:'attended'}:s));
  const handlePurchase=pkg=>setPending(p=>[...p,{...pkg}]);
  const handleNav=(t,extra={})=>{
    if(extra.openCancel)setInitCancel(extra.openCancel);
    else setInitCancel(null);
    setTab(t);
  };
  const navItems=[{id:'home',l:'Home',ic:I.home},{id:'book',l:'Book',ic:I.cal},{id:'points',l:'Points',ic:I.zap},{id:'schedule',l:'Schedule',ic:I.clk},{id:'profile',l:'Profile',ic:I.usr}];

  return(
    <div style={{background:'#eae9e6',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 12px 40px',gap:16,fontFamily:FB}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:FD,fontSize:40,fontWeight:900,color:K,letterSpacing:'6px'}}>INCHES</div>
        <div style={{fontSize:10,fontWeight:700,color:'#999',letterSpacing:'2.5px',textTransform:'uppercase',marginTop:2,fontFamily:FB}}>Performance Training · Athlete App</div>
      </div>
      <div style={{width:375,height:812,background:W,borderRadius:50,border:'1.5px solid #bbb',overflow:'hidden',display:'flex',flexDirection:'column',position:'relative',boxShadow:'0 28px 72px rgba(0,0,0,.22),0 4px 16px rgba(0,0,0,.1)'}}>
        <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:110,height:30,background:K,borderRadius:'0 0 18px 18px',zIndex:10}}/>
        <div style={{height:44,padding:'12px 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,background:W,position:'relative',zIndex:5}}>
          <span style={{fontSize:15,fontWeight:600,color:K,fontFamily:FB}}>9:41</span>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <svg width="16" height="11" viewBox="0 0 16 11" fill={K}><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y="0" width="3" height="11" rx="1"/><rect x="13.5" y="1" width="2.5" height="10" rx=".5" opacity=".3"/></svg>
            <svg width="14" height="11" viewBox="0 0 15 11" fill="none"><path d="M7.5 2.5C9.5 2.5 11.3 3.3 12.6 4.6L14 3.2C12.3 1.5 10 .5 7.5.5 5 .5 2.7 1.5 1 3.2L2.4 4.6C3.7 3.3 5.5 2.5 7.5 2.5Z" fill={K}/><path d="M7.5 5.5C8.7 5.5 9.8 6 10.6 6.8L12 5.4C10.8 4.2 9.2 3.5 7.5 3.5 5.8 3.5 4.2 4.2 3 5.4L4.4 6.8C5.2 6 6.3 5.5 7.5 5.5Z" fill={K}/><circle cx="7.5" cy="9.5" r="1.5" fill={K}/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke={K} strokeOpacity=".35"/><rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill={K}/><path d="M23 4.5V7.5c.8-.3 1.5-1.1 1.5-1.5S23.8 4.8 23 4.5Z" fill={K} fillOpacity=".4"/></svg>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',overflowX:'hidden',scrollbarWidth:'none',WebkitOverflowScrolling:'touch',position:'relative'}}>
          {qrSession&&<QRCheckIn session={qrSession} onSuccess={handleCheckInSuccess} onClose={()=>setQrSession(null)}/>}
          {tab==='home'    &&<HomeScreen     sessions={sessions} onNav={handleNav} onCheckIn={setQrSession}/>}
          {tab==='book'    &&<BookScreen     onBook={handleBook} onPrivateBook={handlePrivateBook}/>}
          {tab==='points'  &&<PointsScreen   pending={pending} onPurchase={handlePurchase}/>}
          {tab==='schedule'&&<ScheduleScreen sessions={sessions} onCancel={handleCancel} onCheckIn={setQrSession} initialCancel={initCancel}/>}
          {tab==='profile' &&<ProfileScreen/>}
        </div>
        <div style={{height:76,background:W,borderTop:`1.5px solid ${G}`,display:'flex',alignItems:'flex-start',paddingTop:10,flexShrink:0}}>
          {navItems.map(item=>(
            <div key={item.id} onClick={()=>{if(item.id!=='schedule')setInitCancel(null);setTab(item.id);}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer',padding:'3px 0'}}>
              <Ic p={item.ic} c={tab===item.id?R:C} s={22}/>
              <span style={{fontSize:9.5,fontWeight:700,letterSpacing:'.3px',textTransform:'uppercase',fontFamily:FB,color:tab===item.id?R:'#bbb'}}>{item.l}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{fontSize:11,color:'#999',textAlign:'center',fontFamily:FB,maxWidth:375}}>
        INCHES Athlete App · v3 · Fully Reactive<br/>
        <span style={{color:'#bbb'}}>Private booking with coach profiles · QR Check-in · Full calendar</span>
      </div>
    </div>
  );
}

document.getElementById('loading').style.display='none';
document.getElementById('root').style.display='block';
ReactDOM.createRoot(document.getElementById('root')).render(<InchesAthlete/>);
</script>
</body>
</html>
