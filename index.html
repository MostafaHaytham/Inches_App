  {id:5, date:OFF(1),   time:'7:00 AM', type:'GROUP',  name:'MORNING CONDITIONING',branch:'New Cairo',   maxA:12,pts:8, status:'upcoming',athletes:[1,4,6],  notes:'',att:{}},
  {id:6, date:OFF(2),   time:'6:00 PM', type:'GROUP',  name:'EVENING HIIT',        branch:'Maadi',       maxA:12,pts:8, status:'upcoming',athletes:[3,6],    notes:'',att:{}},

/* Compact tag */

/* ── GET POLICY TIER ──────────────────────────────────────────── */
const getPolicy=s=>{
  const[tm,ap]=(s.time||'8:00 AM').split(' ');
  const[h,m]=tm.split(':').map(Number);
  const hr=h+(ap==='PM'&&h!==12?12:(ap==='AM'&&h===12?-12:0));
  const dt=new Date(s.date);dt.setHours(hr,m||0,0,0);
  const hrs=(dt-Date.now())/3600000;
  return hrs>24?CANCEL_POLICY[0]:hrs>2?CANCEL_POLICY[1]:CANCEL_POLICY[2];
};
 
/* ── MINI CALENDAR ────────────────────────────────────────────── */
function MiniCal({month,year,selected,onSelect,onPrev,onNext,markedDates=[]}){
  const fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div style={{padding:'0 14px 12px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <button onClick={onPrev} style={{width:28,height:28,borderRadius:8,border:`1.5px solid ${G}`,background:'transparent',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',color:C}}>‹</button>
        <span style={{fontFamily:FD,fontSize:16,fontWeight:800,color:K}}>{MO_L[month]} {year}</span>
        <button onClick={onNext} style={{width:28,height:28,borderRadius:8,border:`1.5px solid ${G}`,background:'transparent',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',color:C}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>(
          <div key={d} style={{textAlign:'center',fontSize:8.5,fontWeight:700,color:'#ccc',fontFamily:FB,padding:'2px 0'}}>{d}</div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((d,i)=>{
          const dt=d?new Date(year,month,d):null;
          const sel=dt&&sameDay(dt,selected),tod=dt&&isToday(dt);
          const dot=dt&&markedDates.some(md=>sameDay(md,dt));
          return(
            <div key={i} onClick={()=>dt&&onSelect(dt)}
              style={{height:28,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:7,
                cursor:d?'pointer':'default',position:'relative',
                background:sel?K:tod?RB:'transparent',
                border:tod&&!sel?`1.5px solid ${R}`:'1.5px solid transparent',
                fontSize:11,fontWeight:sel||tod?700:400,
                color:sel?W:tod?R:d?C:'transparent',fontFamily:FB,transition:'all .1s'}}>
              {d||''}
              {dot&&!sel&&<div style={{position:'absolute',bottom:2,left:'50%',transform:'translateX(-50%)',width:3,height:3,borderRadius:'50%',background:R}}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}
 
/* ── SESSION CARD (compact) ───────────────────────────────────── */
function SessCard({s,onCancel,onAtt}){
  return(
    <div style={{background:W,border:`1.5px solid ${s.status==='done'?GR+'33':s.status==='cancelled'?G:RBR}`,borderRadius:12,padding:'10px 12px',marginBottom:8,opacity:s.status==='cancelled'?.55:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4,flexWrap:'wrap'}}>
            <span style={{fontSize:10,fontWeight:700,color:R,fontFamily:FB}}>{fmtD(s.date)} · {s.time}</span>
            <Tag label={s.type} c={s.type==='PRIVATE'?AM:BL} bg={s.type==='PRIVATE'?AMB:BLB}/>
            <Tag label={s.branch} c={'#777'} bg={GL}/>
            {s.status==='done'&&<Tag label="✓ Done" c={GR} bg={GRB}/>}
            {s.status==='cancelled'&&<Tag label="Cancelled" c={'#999'} bg={GL}/>}
          </div>
          <div style={{fontFamily:FD,fontSize:15,fontWeight:800,color:K,marginBottom:5}}>{s.name}</div>
          <AvatarStack ids={s.athletes}/>
        </div>
      </div>
      {s.notes&&<div style={{background:GL,borderRadius:7,padding:'5px 9px',marginBottom:7,fontSize:10,color:'#777',fontFamily:FB,lineHeight:1.4}}>📝 {s.notes}</div>}
      {s.status!=='cancelled'&&(
        <div style={{display:'flex',gap:6}}>
          {s.status!=='done'&&(
            <button onClick={()=>onCancel(s)} style={{flex:1,background:'transparent',border:`1.5px solid ${G}`,borderRadius:8,padding:'7px 0',fontSize:11,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>Cancel</button>
          )}
          <button onClick={()=>onAtt(s)} style={{flex:2,background:s.status==='done'?GRB:K,border:s.status==='done'?`1.5px solid ${GR}33`:'none',borderRadius:8,padding:'7px 0',fontSize:11,fontWeight:700,color:s.status==='done'?GR:W,cursor:'pointer',fontFamily:FB}}>
            {s.status==='done'?'Edit Attendance':'Mark Attendance'}
          </button>
        </div>
      )}
    </div>
  );
}

        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{flex:1,background:'transparent',border:`1.5px solid ${G}`,borderRadius:10,padding:'10px 0',fontSize:12,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>Keep Session</button>

/* ── SCHEDULE SCREEN ──────────────────────────────────────────── */
function ScheduleScreen({sessions,onCancel,onAtt,onNew}){
  const[selDate,setSelDate]=useState(new Date());
  const[calMo,setCalMo]=useState(new Date());

  const upcomingSess=sessions.filter(s=>s.status==='upcoming').sort((a,b)=>a.date-b.date);

    <div style={{paddingBottom:16}}>

          <div key={v} onClick={()=>setView(v)} style={{flex:1,textAlign:'center',padding:'7px 0',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',background:view===v?W:'transparent',color:view===v?K:'#bbb',boxShadow:view===v?'0 1px 3px rgba(0,0,0,.1)':'none',fontFamily:FB,transition:'all .12s'}}>{l}</div>

              <div style={{background:GL,border:`1.5px solid ${G}`,borderRadius:12,padding:20,textAlign:'center'}}>
                <div style={{fontSize:12,color:'#aaa',fontFamily:FB,marginBottom:9}}>No sessions on this day</div>

        )}
        {view==='upcoming'&&(
          <>
            <SH label={upcomingSess.length+' upcoming'}/>
            {upcomingSess.length===0?(
              <div style={{background:GL,border:`1.5px solid ${G}`,borderRadius:12,padding:18,textAlign:'center'}}><div style={{fontSize:12,color:'#aaa',fontFamily:FB}}>No upcoming sessions</div></div>

          </>
        )}
      </div>
    </div>
  );
}

/* ── APP ROOT ─────────────────────────────────────────────────── */
function App(){
  const[tab,setTab]=useState('home');
  const[sessions,setSessions]=useState(mkSess);
  const[cancelM,setCancelM]=useState(null);
  const[attM,setAttM]=useState(null);
  const[createM,setCreateM]=useState(false);
 
  const handleCancel=id=>{setSessions(p=>p.map(s=>s.id===id?{...s,status:'cancelled'}:s));setCancelM(null);};
  const handleAtt=(id,att,notes)=>{setSessions(p=>p.map(s=>s.id===id?{...s,att,notes,status:'done'}:s));setAttM(null);};
  const handleCreate=form=>{
    const br=BRANCHES.find(b=>b.id===form.branch)?.name||'';
    const[hh,mm]=form.time.split(':');const h=parseInt(hh);const ap=h>=12?'PM':'AM';const h12=h>12?h-12:h===0?12:h;
    setSessions(p=>[...p,{id:Date.now(),date:form.date,time:`${h12}:${mm} ${ap}`,type:form.type,name:form.name,branch:br,maxA:form.type==='PRIVATE'?1:form.max,pts:form.pts,status:'upcoming',athletes:[],notes:form.notes,att:{}}]);
  };
 
  const navItems=[
    {id:'home',     l:'Home',     ic:I.home},
    {id:'schedule', l:'Schedule', ic:I.cal},
    {id:'athletes', l:'Athletes', ic:I.usrs},
    {id:'sessions', l:'Sessions', ic:I.clip},
    {id:'profile',  l:'Profile',  ic:I.usr},
  ];
 
  return(
    <div className="app-shell">
      <div className="brand">
        <div className="brand-name">INCHES</div>
        <div className="brand-sub">Coach App</div>
      </div>
      <div className="phone">
        <div className="notch"/>
        {/* Status bar */}
        <div className="sbar">
          <span style={{fontSize:12,fontWeight:600,color:K,fontFamily:FB}}>9:41</span>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <svg width="13" height="9" viewBox="0 0 16 11" fill={K}><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y="0" width="3" height="11" rx="1"/><rect x="13.5" y="1" width="2.5" height="10" rx=".5" opacity=".3"/></svg>
            <svg width="12" height="9" viewBox="0 0 15 11" fill="none"><path d="M7.5 2.5C9.5 2.5 11.3 3.3 12.6 4.6L14 3.2C12.3 1.5 10 .5 7.5.5 5 .5 2.7 1.5 1 3.2L2.4 4.6C3.7 3.3 5.5 2.5 7.5 2.5Z" fill={K}/><path d="M7.5 5.5C8.7 5.5 9.8 6 10.6 6.8L12 5.4C10.8 4.2 9.2 3.5 7.5 3.5 5.8 3.5 4.2 4.2 3 5.4L4.4 6.8C5.2 6 6.3 5.5 7.5 5.5Z" fill={K}/><circle cx="7.5" cy="9.5" r="1.5" fill={K}/></svg>
            <svg width="20" height="10" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke={K} strokeOpacity=".35"/><rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill={K}/><path d="M23 4.5V7.5c.8-.3 1.5-1.1 1.5-1.5S23.8 4.8 23 4.5Z" fill={K} fillOpacity=".4"/></svg>
          </div>
        </div>
        {/* Main screen */}
        <div className="scr" style={{position:'relative'}}>
          {cancelM&&<CancelModal session={cancelM} onConfirm={handleCancel} onClose={()=>setCancelM(null)}/>}
          {attM&&<AttModal session={attM} onSave={handleAtt} onClose={()=>setAttM(null)}/>}
          {createM&&<CreateModal onSave={handleCreate} onClose={()=>setCreateM(false)}/>}
          {tab==='home'     &&<HomeScreen     sessions={sessions} onNav={setTab} onCancel={setCancelM} onAtt={setAttM} onNew={()=>setCreateM(true)}/>}
          {tab==='schedule' &&<ScheduleScreen sessions={sessions} onCancel={setCancelM} onAtt={setAttM} onNew={()=>setCreateM(true)}/>}
          {tab==='athletes' &&<AthletesScreen sessions={sessions}/>}
          {tab==='sessions' &&<SessionsScreen sessions={sessions} onCancel={setCancelM} onAtt={setAttM} onNew={()=>setCreateM(true)}/>}
          {tab==='profile'  &&<ProfileScreen  sessions={sessions}/>}
        </div>
        {/* Bottom nav */}
        <div className="bnav">
          {navItems.map(item=>(
            <div key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',padding:'2px 0'}}>
              <Ic p={item.ic} c={tab===item.id?R:C} s={19}/>
              <span style={{fontSize:8.5,fontWeight:700,letterSpacing:'.3px',textTransform:'uppercase',fontFamily:FB,color:tab===item.id?R:'#bbb'}}>{item.l}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
 
document.getElementById('loading').style.display='none';
document.getElementById('root').style.display='block';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
