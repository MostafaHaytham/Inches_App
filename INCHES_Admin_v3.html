<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#eae9e6;font-family:'DM Sans',sans-serif}
#root{height:100%}
.shell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;gap:7px;padding:8px 0 6px}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#030000;letter-spacing:5px;line-height:1;text-align:center}
.brand-sub{font-size:8px;font-weight:700;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-top:1px;text-align:center}
.phone{background:#fff;border-radius:36px;border:1.5px solid #bbb;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.18);width:375px;max-width:calc(100vw - 12px);height:calc(100dvh - 76px);max-height:780px}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:22px;background:#030000;border-radius:0 0 13px 13px;z-index:20}
.sbar{height:34px;padding:8px 20px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#fff;z-index:4}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;z-index:1}
.scr::-webkit-scrollbar{display:none}
.bnav{height:56px;background:#fff;border-top:1.5px solid #dddada;display:flex;align-items:flex-start;padding-top:7px;flex-shrink:0;z-index:4}
/* Modals sit INSIDE .phone (position:relative+overflow:hidden) via position:absolute */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.sh{background:#fff;border-radius:18px 18px 0 0;max-height:90%;overflow-y:auto;scrollbar-width:none}
.sh::-webkit-scrollbar{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.su{animation:su .24s cubic-bezier(.32,.72,0,1)}
.fi{animation:fi .18s ease}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;background:#eae9e6}
.spin{width:32px;height:32px;border:3px solid #dddada;border-top-color:#c72333;border-radius:50%;animation:spin .8s linear infinite}
input,select,textarea{outline:none}
input::placeholder,textarea::placeholder{color:#bbb}
</style>
