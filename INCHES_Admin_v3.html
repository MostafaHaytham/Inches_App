<style>

  #root{height:100%}
  .shell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;gap:7px;padding:8px 0 6px}
  .brand{text-align:center;flex-shrink:0}
  .brand-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#030000;letter-spacing:5px;line-height:1}
  .brand-sub{font-size:8px;font-weight:700;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
  /* phone — position:relative is critical so absolute children (modals) clip to it */
  .phone{background:#fff;border-radius:36px;border:1.5px solid #bbb;overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,.18),0 3px 10px rgba(0,0,0,.07);
    width:375px;max-width:calc(100vw - 12px);height:calc(100dvh - 76px);max-height:780px}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:22px;background:#030000;border-radius:0 0 13px 13px;z-index:20}
  .sbar{height:34px;padding:8px 20px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#fff;z-index:4;position:relative}
  .scr{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;z-index:1}
  .scr::-webkit-scrollbar{display:none}
  .bnav{height:56px;background:#fff;border-top:1.5px solid #dddada;display:flex;align-items:flex-start;padding-top:7px;flex-shrink:0;z-index:4;position:relative}
  /* MODAL OVERLAY — absolutely positioned inside .phone, covers everything including nav */
  .moverlay{position:absolute;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
  .msheet{background:#fff;border-radius:18px 18px 0 0;max-height:90%;overflow-y:auto;scrollbar-width:none}
  .msheet::-webkit-scrollbar{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .fi{animation:fadeIn .18s ease}
  .su{animation:slideUp .24s cubic-bezier(.32,.72,0,1)}
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;background:#eae9e6}
  .spin{width:32px;height:32px;border:3px solid #dddada;border-top-color:#c72333;border-radius:50%;animation:spin .8s linear infinite}
  textarea,input,select{outline:none}
  input::placeholder,textarea::placeholder{color:#bbb}

    id:i+1,
    name:`${fn} ${ln}`,init:`${fn[0]}${ln[0]}`,
    branch,pts,status:i<145?'active':'inactive',
    sess,att,joined:`${mo} ${yr}`,injury,goal,notes:'',

const genPayments=()=>{
  const athletes=genAthletes();
  const pkgs=PKG_DEFS;
  const statuses=['approved','approved','approved','pending','rejected'];
  const payments=[];
  let id=1;
  for(let i=0;i<60;i++){
    const ath=athletes[i*2%150];
    const pkg=pkgs[i%4];
    const daysAgo=i*3+1;
    const status=i<3?'pending':(i===25?'rejected':statuses[i%5]);
    payments.push({
      id,
      ath:ath.name,athId:ath.id,
      pkg:pkg.name,pts:pkg.pts,price:pkg.price,
      status,
      date:OFF(-daysAgo),
      receipt:status!=='rejected'||i%10!==0,
      reason:status==='rejected'?'Receipt image unclear or invalid':null,
    });
    id++;
  }
  return payments;
};

function SalaryContent({coach,onSave,onClose}){
  const[salary,setSalary]=useState({...coach.salary});
  const[pricing,setPricing]=useState({...coach.pricing});
  const[tab,setTab]=useState('salary');
  const ss=(k,v)=>setSalary(s=>({...s,[k]:v}));
  const sp=(k,v)=>setPricing(p=>({...p,[k]:v}));
  // estimated monthly based on ~22 sessions/month
  const estimate=()=>{
    const base=salary.base||0;
    if(salary.type==='per_session') return (salary.rate||0)*22;
    if(salary.type==='monthly')    return (salary.rate||0);
    if(salary.type==='hybrid')     return base+((salary.per_session||0)*22);
    if(salary.type==='pct_session'){
      // avg session price ~250 EGP * pct * 22 sessions + optional base
      const avgPts=Math.round((pricing.p30+pricing.p45+pricing.p60+pricing.p90)/4);
      return Math.round(base + (salary.pct||0)/100*avgPts*22);
    }
    return 0;
  };
  return(
    <div className="moverlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="msheet su">
        <div style={{padding:'14px 14px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontFamily:FD,fontSize:18,fontWeight:800,color:K}}>PLAN — {coach.name.split(' ')[0].toUpperCase()}</span>
            <button onClick={onClose} style={{background:'transparent',border:`1.5px solid ${G}`,borderRadius:8,width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic p={I.X} c={C} s={13}/></button>
          </div>
          <STabs tabs={[['salary','Salary Plan'],['pricing','Private Rates']]} active={tab} onChange={setTab}/>
        </div>
        {tab==='salary'&&(
          <div style={{padding:'0 14px 6px'}} className="fi">
            <div style={{fontSize:9,fontWeight:700,color:'#999',letterSpacing:'1.4px',textTransform:'uppercase',fontFamily:FB,marginBottom:7}}>SALARY TYPE</div>
            {[
              ['per_session', 'Per Session (Fixed)', 'Fixed EGP amount per session completed'],
              ['monthly',     'Monthly Fixed',        'Fixed EGP salary regardless of sessions'],
              ['hybrid',      'Monthly Base + Per Session', 'Fixed base + additional EGP per session'],
              ['pct_session', '% of Session Price',   '% of each session\'s price + optional fixed base'],
            ].map(([val,l,d])=>(
              <div key={val} onClick={()=>ss('type',val)} style={{display:'flex',alignItems:'flex-start',gap:9,padding:'9px 0',borderBottom:`1px solid ${G}`,cursor:'pointer'}}>
                <div style={{width:15,height:15,borderRadius:'50%',border:`2px solid ${salary.type===val?R:G}`,background:salary.type===val?R:'transparent',marginTop:2,flexShrink:0,transition:'all .12s'}}/>
                <div><div style={{fontSize:12,fontWeight:salary.type===val?700:400,color:salary.type===val?K:'#888',fontFamily:FB}}>{l}</div><div style={{fontSize:10,color:'#bbb',fontFamily:FB,marginTop:1}}>{d}</div></div>
              </div>
            ))}
            <div style={{marginTop:12}}>
              {salary.type==='per_session'&&(
                <IL label="Rate per session (EGP)"><input type="number" value={salary.rate||0} onChange={e=>ss('rate',parseInt(e.target.value)||0)} style={iS}/></IL>
              )}
              {salary.type==='monthly'&&(
                <IL label="Monthly salary (EGP)"><input type="number" value={salary.rate||0} onChange={e=>ss('rate',parseInt(e.target.value)||0)} style={iS}/></IL>
              )}
              {salary.type==='hybrid'&&(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <IL label="Base monthly (EGP)"><input type="number" value={salary.base||0} onChange={e=>ss('base',parseInt(e.target.value)||0)} style={iS}/></IL>
                  <IL label="Per session (EGP)"><input type="number" value={salary.per_session||0} onChange={e=>ss('per_session',parseInt(e.target.value)||0)} style={iS}/></IL>
                </div>
              )}
              {salary.type==='pct_session'&&(
                <>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <IL label="% of session price">
                      <div style={{position:'relative'}}>
                        <input type="number" value={salary.pct||0} min={0} max={100} onChange={e=>ss('pct',parseFloat(e.target.value)||0)} style={{...iS,paddingRight:28}}/>
                        <span style={{position:'absolute',right:11,top:'50%',transform:'translateY(-50%)',fontSize:13,fontWeight:700,color:AM,fontFamily:FB}}>%</span>
                      </div>
                    </IL>
                    <IL label="Fixed base/month (EGP)"><input type="number" value={salary.base||0} onChange={e=>ss('base',parseInt(e.target.value)||0)} style={iS}/></IL>
                  </div>
                  <div style={{background:AMB,border:`1px solid ${AM}33`,borderRadius:9,padding:'8px 11px',marginBottom:10,fontSize:11,color:AM,fontFamily:FB,lineHeight:1.5}}>
                    Coach earns <strong>{salary.pct||0}%</strong> of each session's price, plus <strong>{(salary.base||0).toLocaleString()} EGP</strong> fixed monthly base.
                  </div>
                </>
              )}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <IL label="Bonus after N sessions"><input type="number" value={salary.bonus_threshold||0} onChange={e=>ss('bonus_threshold',parseInt(e.target.value)||0)} style={iS}/></IL>
                <IL label="Bonus amount (EGP)"><input type="number" value={salary.bonus_amount||0} onChange={e=>ss('bonus_amount',parseInt(e.target.value)||0)} style={iS}/></IL>
              </div>
              <div style={{background:K,borderRadius:11,padding:'11px 13px',marginBottom:6}}>
                <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.35)',letterSpacing:'1.3px',textTransform:'uppercase',fontFamily:FB,marginBottom:5}}>ESTIMATED THIS MONTH</div>

                <div style={{fontSize:10,color:'rgba(255,255,255,.3)',fontFamily:FB,marginTop:3}}>Based on ~22 sessions/month</div>
              </div>
            </div>
          </div>
        )}
        {tab==='pricing'&&(
          <div style={{padding:'0 14px 6px'}} className="fi">
            <div style={{background:BLB,border:`1px solid ${BL}33`,borderRadius:9,padding:'8px 11px',marginBottom:12,display:'flex',gap:7}}>
              <Ic p={I.inf} c={BL} s={13}/>
              <span style={{fontSize:11,color:BL,fontFamily:FB,lineHeight:1.5}}>Per-coach private rates. Override platform defaults for {coach.name}.</span>
            </div>
            {[['p30','30 min private'],['p45','45 min private'],['p60','60 min private'],['p90','90 min private']].map(([k,l])=>(
              <IL key={k} label={`${l} (EGP)`}><input type="number" value={pricing[k]||0} onChange={e=>sp(k,parseInt(e.target.value)||0)} style={iS}/></IL>
            ))}
          </div>
        )}
        <div style={{padding:'0 14px 20px'}}>
          <button onClick={()=>onSave(coach.id,salary,pricing)} style={{width:'100%',background:K,border:'none',borderRadius:11,padding:'12px 0',fontSize:13,fontWeight:700,color:W,cursor:'pointer',fontFamily:FB}}>
            Save Plan
          </button>
        </div>
      </div>
    </div>
  );

/* ── SCREEN: PAYMENTS ─────────────────────────────────── */

  const approved=payments.filter(p=>p.status==='approved');
  const rejected=payments.filter(p=>p.status==='rejected');
  const list=tab==='pending'?pending:tab==='approved'?approved:rejected;
  return(
    <div style={{paddingBottom:16}}>
      <div style={{padding:'10px 14px 0'}}>
        <div style={{fontFamily:FD,fontSize:24,fontWeight:900,color:K,marginBottom:4}}>PAYMENTS</div>

            <button onClick={()=>pending[0]&&onModal('receipt',pending[0])} style={{background:AM,border:'none',borderRadius:8,padding:'7px 11px',fontSize:11,fontWeight:700,color:W,cursor:'pointer',fontFamily:FB}}>Review First</button>
          </div>
        )}
      </div>
      <div style={{display:'flex',gap:7,padding:'0 14px',marginBottom:10,overflowX:'auto',scrollbarWidth:'none'}}>
        {[['pending','Pending',pending.length,AM],['approved','Approved',approved.length,GR],['rejected','Rejected',rejected.length,R]].map(([v,l,n,c])=>(
          <div key={v} onClick={()=>setTab(v)} style={{flexShrink:0,background:tab===v?K:GL,border:`1.5px solid ${tab===v?K:G}`,borderRadius:8,padding:'5px 11px',display:'flex',gap:5,alignItems:'center',cursor:'pointer',transition:'all .12s'}}>
            <span style={{fontFamily:FD,fontSize:15,fontWeight:900,color:tab===v?W:c,lineHeight:1}}>{n}</span>
            <span style={{fontSize:10,fontWeight:600,color:tab===v?'rgba(255,255,255,.5)':'#aaa',fontFamily:FB}}>{l}</span>
          </div>
        ))}
      </div>
      <div style={{padding:'0 14px'}}>
        {list.length===0?(
          <div style={{background:GL,border:`1.5px solid ${G}`,borderRadius:12,padding:22,textAlign:'center'}}><div style={{fontSize:12,color:'#bbb',fontFamily:FB}}>No {tab} payments</div></div>
        ):list.slice(0,30).map(p=>(
          <div key={p.id} style={{background:W,border:`1.5px solid ${p.status==='pending'?AM+'44':p.status==='approved'?GR+'22':G}`,borderRadius:12,padding:'10px 12px',marginBottom:8,cursor:'pointer'}} onClick={()=>onModal('receipt',p)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <div>
                <div style={{fontFamily:FD,fontSize:14,fontWeight:800,color:K,marginBottom:2}}>{p.ath}</div>
                <div style={{fontSize:11,color:'#888',fontFamily:FB}}>{p.pkg} · {p.pts} pts</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:FD,fontSize:17,fontWeight:900,color:R,lineHeight:1}}>{p.price.toLocaleString()}</div>
                <div style={{fontSize:9,color:'#bbb',fontFamily:FB}}>EGP</div>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:10,color:'#aaa',fontFamily:FB}}>{fmtD(p.date)}</span>
              <Tag label={p.status==='pending'?'⏳ Pending':p.status==='approved'?'✓ Approved':'✕ Rejected'} c={p.status==='pending'?AM:p.status==='approved'?GR:R} bg={p.status==='pending'?AMB:p.status==='approved'?GRB:RB}/>

            {p.reason&&<div style={{fontSize:10,color:R,fontFamily:FB,marginTop:4}}>{p.reason}</div>}

    </div>

}

/* ── SCREEN: CONFIG ───────────────────────────────────── */

  const setPkg=(id,field,val)=>setConfig(c=>({...c,packages:c.packages.map(p=>p.id===id?{...p,[field]:val}:p)}));
  const addST=()=>{const id=Date.now();setConfig(c=>({...c,session_types:[...c.session_types,{id,name:'New Session Type',dur:60,pts_group:8,active:true}];}));};
  const delST=id=>setConfig(c=>({...c,session_types:c.session_types.filter(s=>s.id!==id)}));
  const addPkg=()=>{const id=Date.now();setConfig(c=>({...c,packages:[...c.packages,{id,name:'New Package',pts:100,price:3000,active:true}];}));};

  const toggleAnn=id=>setConfig(c=>({...c,announcements:c.announcements.map(a=>a.id===id?{...a,active:!a.active}:a)}));
  const deleteAnn=id=>setConfig(c=>({...c,announcements:c.announcements.filter(a=>a.id!==id)}));
  const saveAnn=form=>{
    if(form.id){setConfig(c=>({...c,announcements:c.announcements.map(a=>a.id===form.id?{...a,...form}:a)}));}
    else{setConfig(c=>({...c,announcements:[{...form,id:Date.now(),date:new Date()},...c.announcements]}));}

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:7}}>
                <div style={{display:'flex',gap:5}}>
                  <Tag label={a.audience==='all'?'All Users':a.audience==='athletes'?'Athletes':'Coaches'} c={BL} bg={BLB}/>
                  <Tag label={a.active?'Live':'Draft'} c={a.active?GR:'#999'} bg={a.active?GRB:GL}/>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>onModal('announcement',a)} style={{background:'transparent',border:`1.5px solid ${G}`,borderRadius:7,padding:'4px 9px',fontSize:10,fontWeight:600,color:C,cursor:'pointer',fontFamily:FB}}>Edit</button>
                  <button onClick={()=>deleteAnn(a.id)} style={{background:'transparent',border:`1.5px solid ${R}33`,borderRadius:7,padding:'4px 9px',fontSize:10,fontWeight:600,color:R,cursor:'pointer',fontFamily:FB}}>Delete</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── ROOT APP ──────────────────────────────────────────── */
function App(){
  const[tab,setTab]=useState('dashboard');
  const[athletes,setAthletes]=useState(()=>genAthletes());
  const[coaches,setCoaches]=useState(()=>genCoaches());
  const[payments,setPayments]=useState(()=>genPayments());
  const[sessions,setSessions]=useState(()=>initSessions());
  const[config,setConfig]=useState(()=>initConfig());
  // Single modal state — type + data, rendered inside .phone outside .scr
  const[modal,setModal]=useState(null); // {type, data}
  const openModal=(type,data)=>setModal({type,data});
  const closeModal=()=>setModal(null);

  /* Modal handlers */
  const handleManualPts=(id,type,amt,note)=>{
    setAthletes(prev=>prev.map(a=>{
      if(a.id!==id) return a;
      const newPts=type==='add'?a.pts+amt:Math.max(0,a.pts-amt);
      return{...a,pts:newPts,txns:[{t:'admin',d:new Date(),l:note,pts:type==='add'?amt:-amt},...(a.txns||[])]};
    }));
    closeModal();
  };
  const handleOverride=(id,action,note)=>{
    const newStatus=action==='cancel'?'cancelled':action==='mark_done'?'done':'upcoming';
    setSessions(prev=>prev.map(s=>s.id===id?{...s,status:newStatus,adminNote:note}:s));
    closeModal();
  };
  const handleSalary=(id,salary,pricing)=>{
    setCoaches(prev=>prev.map(c=>c.id===id?{...c,salary,pricing}:c));
    closeModal();
  };
  const handleApprove=id=>{setPayments(prev=>prev.map(p=>p.id===id?{...p,status:'approved'}:p));closeModal();};
  const handleReject=(id,reason)=>{setPayments(prev=>prev.map(p=>p.id===id?{...p,status:'rejected',reason}:p));closeModal();};
  const handleAnn=form=>{
    if(form.id){setConfig(c=>({...c,announcements:c.announcements.map(a=>a.id===form.id?{...a,...form}:a)}));}
    else{setConfig(c=>({...c,announcements:[{...form,id:Date.now(),date:new Date()},...c.announcements]}));}
    closeModal();
  };

  const nav=[
    {id:'dashboard',l:'Dash',   ic:I.dash},
    {id:'users',    l:'Users',  ic:I.usrs},
    {id:'sessions', l:'Sessions',ic:I.cal},
    {id:'payments', l:'Pay',    ic:I.coin},
    {id:'config',   l:'Config', ic:I.cog},
  ];

  return(
    <div className="shell">
      <div className="brand"><div className="brand-name">INCHES</div><div className="brand-sub">Admin Panel</div></div>
      <div className="phone">
        <div className="notch"/>
        {/* Status bar */}
        <div className="sbar">
          <span style={{fontSize:12,fontWeight:600,color:K,fontFamily:FB}}>9:41</span>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <svg width="13" height="9" viewBox="0 0 16 11" fill={K}><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y="0" width="3" height="11" rx="1"/><rect x="13.5" y="1" width="2.5" height="10" rx=".5" opacity=".3"/></svg>
            <svg width="12" height="9" viewBox="0 0 15 11" fill="none"><path d="M7.5 2.5C9.5 2.5 11.3 3.3 12.6 4.6L14 3.2C12.3 1.5 10 .5 7.5.5 5 .5 2.7 1.5 1 3.2L2.4 4.6C3.7 3.3 5.5 2.5 7.5 2.5Z" fill={K}/><path d="M7.5 5.5C8.7 5.5 9.8 6 10.6 6.8L12 5.4C10.8 4.2 9.2 3.5 7.5 3.5 5.8 3.5 4.2 4.2 3 5.4L4.4 6.8C5.2 6 6.3 5.5 7.5 5.5Z" fill={K}/><circle cx="7.5" cy="9.5" r="1.5" fill={K}/></svg>
            <svg width="20" height="10" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke={K} strokeOpacity=".35"/><rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill={K}/><path d="M23 4.5V7.5c.8-.3 1.5-1.1 1.5-1.5S23.8 4.8 23 4.5Z" fill={K} fillOpacity=".4"/></svg>
          </div>
        </div>

        {/* Screen content */}
        <div className="scr">
          {tab==='dashboard'&&<DashScreen athletes={athletes} sessions={sessions} payments={payments} onNav={setTab}/>}
          {tab==='users'    &&<UsersScreen athletes={athletes} setAthletes={setAthletes} coaches={coaches} setCoaches={setCoaches} onModal={openModal}/>}
          {tab==='sessions' &&<SessionsScreen sessions={sessions} setSessions={setSessions} onModal={openModal}/>}
          {tab==='payments' &&<PaymentsScreen payments={payments} setPayments={setPayments} onModal={openModal}/>}
          {tab==='config'   &&<ConfigScreen config={config} setConfig={setConfig} onModal={openModal}/>}
        </div>

        {/* Bottom nav */}
        <div className="bnav">
          {nav.map(item=>(
            <div key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',padding:'2px 0'}}>
              <Ic p={item.ic} c={tab===item.id?R:C} s={19}/>
              <span style={{fontSize:8.5,fontWeight:700,letterSpacing:'.3px',textTransform:'uppercase',fontFamily:FB,color:tab===item.id?R:'#bbb'}}>{item.l}</span>
            </div>
          ))}
        </div>

        {/* ── ALL MODALS RENDERED HERE — inside .phone, outside .scr ──
            position:absolute on .moverlay clips to .phone (position:relative+overflow:hidden)
            This guarantees the modal covers the full phone including nav */}
        {modal?.type==='manualPts'  && <ManualPtsContent  athlete={modal.data}  onSave={handleManualPts} onClose={closeModal}/>}
        {modal?.type==='override'   && <OverrideContent   session={modal.data}  onSave={handleOverride}  onClose={closeModal}/>}
        {modal?.type==='salary'     && <SalaryContent     coach={modal.data}    onSave={handleSalary}    onClose={closeModal}/>}
        {modal?.type==='receipt'    && <ReceiptContent    payment={modal.data}  onApprove={handleApprove} onReject={handleReject} onClose={closeModal}/>}
        {modal?.type==='announcement'&& <AnnContent       ann={modal.data}      onSave={handleAnn}       onClose={closeModal}/>}
      </div>
    </div>
  );
}

document.getElementById('loading').style.display='none';
document.getElementById('root').style.display='block';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
